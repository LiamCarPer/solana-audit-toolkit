name: Self-Audit

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'

jobs:
  self-audit:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build sat tool
        run: cargo build --release
      - name: Run IDL analysis on test fixtures
        run: |
          for f in crates/sat/tests/fixtures/*.json; do
            echo "=== Analyzing $f ==="
            cargo run --release -- analyze idl "$f"
          done
      - name: Run AST analysis on toolkit source (self-audit)
        run: cargo run --release -- analyze src crates/sat/src
      - name: Export SARIF results
        run: cargo run --release -- analyze src crates/sat/src --format sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: sat-results.sarif
